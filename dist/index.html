<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/calculator-gemini/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Gemini | Quant Edition</title>
    <script type="module" crossorigin src="/calculator-gemini/assets/index-DoYg9Ins.js"></script>
    <link rel="stylesheet" crossorigin href="/calculator-gemini/assets/index-DkXlr2hT.css">
  </head>
  <body>
    <div id="app">
      <div class="calculator">
        <div class="display">
          <div class="previous-operand" id="previous-operand"></div>
          <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="buttons">
          <button class="span-two ac" data-all-clear>AC</button>
          <button data-delete>DEL</button>
          <button data-operation>÷</button>
          <button data-number>1</button>
          <button data-number>2</button>
          <button data-number>3</button>
          <button data-operation>×</button>
          <button data-number>4</button>
          <button data-number>5</button>
          <button data-number>6</button>
          <button data-operation>+</button>
          <button data-number>7</button>
          <button data-number>8</button>
          <button data-number>9</button>
          <button data-operation>-</button>
          <button data-number>.</button>
          <button data-number>0</button>
          <button class="span-two equals" data-equals>=</button>
        </div>
      </div>
    </div>
  </body>
</html>
